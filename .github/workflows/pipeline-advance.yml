name: Pipeline Advance

# Advances the sequential agent pipeline defined in scripts/agent/pipeline-manifest.json.
# - When a PR that closes a pipeline issue merges into main, kicks the next issue
#   (posts an @codex implementation comment, or pauses with an owner notification).
# - When a PR that closes an automerge-eligible pipeline issue is opened, applies the
#   safe auto-merge request labels. The deterministic path evaluator in
#   scripts/agent/check-safe-automerge.mjs remains the actual merge gate.
# Per .github/AGENT_AUTOMATION_POLICY.md this file is T2: changes require human review.

on:
  pull_request:
    types:
      - closed
      - opened
  schedule:
    # Watchdog: recover from missed/failed kicks (e.g. Codex 5-hour/weekly usage
    # limits). Re-kicks a stalled issue after quota windows reset.
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      kick_issue:
        description: Pipeline issue number to (re)kick manually
        required: true
        type: number

concurrency:
  group: pipeline-advance-${{ github.event.pull_request.number || inputs.kick_issue || 'watchdog' }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  advance:
    name: Advance pipeline
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.action == 'opened' ||
      (github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Advance pipeline state
        uses: actions/github-script@v8
        with:
          # CODEX_KICK_TOKEN: fine-grained PAT (Issues read/write on this repo) belonging
          # to the repo owner. @codex mentions posted by the default github-actions bot
          # are ignored by the Codex connector (bot-loop prevention), so kicks must be
          # authored by a human account. Falls back to the default token, which still
          # posts the comment but will not trigger Codex.
          github-token: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(
              fs.readFileSync('scripts/agent/pipeline-manifest.json', 'utf8'),
            );
            const pipeline = manifest.pipeline;
            const epic = manifest.epic;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const closingIssueNumbers = (body) => {
              const nums = new Set();
              const re = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
              for (const m of (body ?? '').matchAll(re)) nums.add(Number(m[1]));
              return [...nums];
            };

            const mentionBody = (issueNumber) =>
              [
                '@codex please implement this issue exactly as specified in the issue body above, then OPEN A PULL REQUEST on github.com/' + owner + '/' + repo + ' with your changes. Do not stop at a completed task: push the branch and create the pull request yourself using your GitHub access. Creating the PR is part of the task; the task is not done until the PR exists.',
                `Follow epic #${epic} section "Standing agent rules for every issue in this epic":`,
                '- Branch from origin/main; one issue per PR.',
                `- PR body must state purpose, changes, tests run, risks, and include "Closes #${issueNumber}".`,
                '- Smallest change that satisfies the issue; binding contracts and salvage rules in the issue body are not negotiable.',
                '- Never weaken a schema, guard test, or RLS policy to make something pass. Doc deletions require matching removals from docs/doc-registry.json.',
              ].join('\n');

            const comment = (issue_number, body) =>
              github.rest.issues.createComment({ owner, repo, issue_number, body });

            const kick = async (entry) => {
              if (entry.kick === 'mention') {
                await comment(entry.issue, mentionBody(entry.issue));
                await comment(
                  epic,
                  `Pipeline advance: kicked #${entry.issue} for implementation.`,
                );
                core.info(`Kicked #${entry.issue} via @codex mention.`);
              } else if (entry.kick === 'pause') {
                await comment(
                  epic,
                  `Pipeline paused before #${entry.issue}: ${entry.note ?? 'human action required'}. @${manifest.owner} please complete the prerequisite on #${entry.issue}, then re-kick with the Pipeline Advance workflow_dispatch (kick_issue: ${entry.issue}).`,
                );
                core.info(`Paused before #${entry.issue}.`);
              } else {
                core.info(`Entry #${entry.issue} has kick=none; nothing to do.`);
              }
            };

            if (context.eventName === 'schedule') {
              // Watchdog: find the first open pipeline issue and decide whether it
              // is stalled. Covers Codex usage-limit windows (kick posted, no task
              // ever started) and missed advances.
              const RETRY_AFTER_HOURS = 6;
              const NUDGE_AFTER_HOURS = 24;
              const MAX_KICKS = 5;

              for (const entry of pipeline) {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number: entry.issue,
                });
                if (issue.state === 'closed') continue;

                if (entry.kick === 'pause' || entry.kick === 'none') {
                  core.info(`Watchdog: current step #${entry.issue} is ${entry.kick}; human-managed, nothing to do.`);
                  return;
                }

                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo, issue_number: entry.issue, per_page: 100,
                });
                const kicks = comments.filter((c) =>
                  (c.body ?? '').startsWith('@codex please implement'),
                );

                if (kicks.length === 0) {
                  // Predecessor merged but the advance never fired.
                  await kick(entry);
                  await comment(epic, `Pipeline watchdog: #${entry.issue} had no kick; kicked it now.`);
                  return;
                }

                const lastKickAt = new Date(kicks[kicks.length - 1].created_at);
                const hoursSinceKick = (Date.now() - lastKickAt.getTime()) / 36e5;

                const openPrs = await github.paginate(github.rest.pulls.list, {
                  owner, repo, state: 'open', per_page: 100,
                });
                if (openPrs.some((p) => closingIssueNumbers(p.body).includes(entry.issue))) {
                  core.info(`Watchdog: #${entry.issue} has an open PR; healthy.`);
                  return;
                }

                const codexRespondedAfterKick = comments.some(
                  (c) =>
                    (c.user?.login ?? '').includes('codex') &&
                    new Date(c.created_at) > lastKickAt,
                );

                if (codexRespondedAfterKick) {
                  // Task ran but no PR reached GitHub (manual-publish case).
                  // Nudge once after 24h; re-kicking would duplicate the work.
                  if (hoursSinceKick >= NUDGE_AFTER_HOURS && hoursSinceKick < NUDGE_AFTER_HOURS + 6) {
                    await comment(
                      epic,
                      `Pipeline watchdog: #${entry.issue} completed a Codex task ~${Math.round(hoursSinceKick)}h ago but no PR exists. @${manifest.owner} it may be waiting for a manual "Create PR" in the Codex UI.`,
                    );
                  }
                  return;
                }

                if (hoursSinceKick < RETRY_AFTER_HOURS) {
                  core.info(`Watchdog: #${entry.issue} kicked ${hoursSinceKick.toFixed(1)}h ago; waiting.`);
                  return;
                }

                if (kicks.length >= MAX_KICKS) {
                  await comment(
                    epic,
                    `Pipeline watchdog: #${entry.issue} has been kicked ${kicks.length}x with no Codex response. Stopping automatic retries. @${manifest.owner} please investigate.`,
                  );
                  return;
                }

                await comment(entry.issue, mentionBody(entry.issue));
                await comment(
                  epic,
                  `Pipeline watchdog: re-kicked #${entry.issue} (no Codex response ${Math.round(hoursSinceKick)}h after the last kick — likely a usage-limit window).`,
                );
                return;
              }

              core.info('Watchdog: no open pipeline issues.');
              return;
            }

            if (context.eventName === 'workflow_dispatch') {
              const n = Number(context.payload.inputs.kick_issue);
              const entry = pipeline.find((e) => e.issue === n);
              if (!entry) {
                core.setFailed(`Issue #${n} is not in the pipeline manifest.`);
                return;
              }
              // Manual dispatch overrides 'pause'/'none' so the owner can resume gated steps.
              await comment(entry.issue, mentionBody(entry.issue));
              await comment(epic, `Pipeline advance (manual): kicked #${entry.issue}.`);
              return;
            }

            const pr = context.payload.pull_request;
            const nums = closingIssueNumbers(pr.body);
            const entries = pipeline
              .map((e, i) => ({ ...e, index: i }))
              .filter((e) => nums.includes(e.issue));
            if (entries.length === 0) {
              core.info('PR does not close a pipeline issue; nothing to do.');
              return;
            }

            if (context.payload.action === 'opened') {
              // Request safe auto-merge labels for automerge-eligible pipeline PRs.
              if (entries.some((e) => e.automerge)) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: ['agent:ready', 'risk:low', 'automerge:safe'],
                });
                core.info(`Applied safe auto-merge request labels to PR #${pr.number}.`);
              }
              return;
            }

            // closed + merged into main: kick the successor of the furthest completed entry.
            const furthest = entries.reduce((a, b) => (a.index > b.index ? a : b));
            const next = pipeline[furthest.index + 1];
            if (!next) {
              await comment(
                epic,
                `Pipeline complete: #${furthest.issue} was the final step. @${manifest.owner}`,
              );
              return;
            }
            await kick(next);
