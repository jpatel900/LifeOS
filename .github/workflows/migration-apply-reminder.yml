# U2b (migration-drift prevention): when a PR ADDS a migration, note how prod
# apply happens. Since migration-apply.yml landed, a merged additive migration
# AUTO-APPLIES to prod (zero-touch); this reminder points at that and names the
# manual runbook only as the fallback (auto-apply secret absent, or the
# destructive-statement guard halts). Informational only — not a merge gate.
name: Migration Apply Reminder

on:
  pull_request:
    paths:
      - "supabase/migrations/**"

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Flag added migrations
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          added=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" -- 'supabase/migrations/**/*.sql' || true)
          if [ -z "$added" ]; then
            echo "No newly-added migration files in this PR."
            exit 0
          fi
          echo "::warning title=Prod migration will auto-apply on merge::This PR adds migration(s). On merge, the Migration Apply workflow applies them to prod automatically (zero-touch) and Migration Drift confirms green. Watch both runs. Fallback if auto-apply is off/halted: 'pnpm drift:assemble <files>' → paste in the Supabase SQL Editor."
          {
            echo "### 🛠️ This PR adds migrations — auto-apply on merge"
            echo ""
            echo "On merge, **Migration Apply** applies these to prod automatically (zero-touch), then **Migration Drift** confirms green. Watch both workflow runs after merge."
            echo ""
            echo "**Fallback** — only if auto-apply is disabled (secret absent) or halts (destructive-statement guard): generate the paste-ready SQL and apply it manually:"
            echo ""
            echo '```bash'
            printf 'pnpm drift:assemble \\\n'
            for f in $added; do
              printf '  %s \\\n' "$f"
            done
            printf '  --date=$(date +%%F)\n'
            echo '```'
            echo ""
            echo "Paste the output into the Supabase SQL Editor and run it, then re-run **Migration Drift** until green."
          } >> "$GITHUB_STEP_SUMMARY"
