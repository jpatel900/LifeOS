name: CI

on:
  pull_request:
  push:
    branches:
      - main

# A new push to the same PR supersedes the previous run — cancel it instead
# of paying for both. Pushes to main keep distinct groups (never cancelled).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.detect.outputs.heavy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect heavy-relevant changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
            echo "Event ${{ github.event_name }}: running full suite."
            exit 0
          fi
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)"
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(apps/web/|supabase/)'; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
            echo "apps/web or supabase changed: e2e + migrations-rls will run."
          else
            echo "heavy=false" >> "$GITHUB_OUTPUT"
            echo "No apps/web or supabase changes: e2e + migrations-rls will be skipped for this PR."
          fi

  validate-monorepo:
    name: Monorepo Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check formatting
        run: |
          if ! pnpm format:check; then
            echo "::warning::pnpm format:check failed. Formatting drift is non-blocking in this workflow."
          fi

  e2e:
    name: Playwright E2E
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @lifeos/web exec playwright install --with-deps msedge

      - name: Run Playwright E2E suite
        run: pnpm --filter @lifeos/web test:e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  migrations-rls:
    name: Migrations + RLS Verification
    needs: changes
    if: needs.changes.outputs.heavy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations and seed from scratch
        run: supabase db reset

      - name: Run RLS suite against live local database
        run: |
          eval "$(supabase status -o env | sed 's/^/export /')"
          RUN_SUPABASE_RLS_TESTS=1 \
          NEXT_PUBLIC_SUPABASE_URL="$API_URL" \
          NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY" \
          pnpm --filter @lifeos/web test phase4aRls.local
