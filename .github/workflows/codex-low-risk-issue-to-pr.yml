name: Codex Low-Risk Issue To PR

on:
  issues:
    types:
      - labeled
      - edited
  workflow_dispatch:
    inputs:
      issue_number:
        description: Open issue number labeled `agent:ready` and `risk:low`
        required: true
        type: number

concurrency:
  group: codex-low-risk-issue-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read

jobs:
  resolve-issue:
    name: Resolve issue scope
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      issue_number: ${{ steps.resolve.outputs.issue_number }}
      issue_title: ${{ steps.resolve.outputs.issue_title }}
      issue_url: ${{ steps.resolve.outputs.issue_url }}
      issue_body: ${{ steps.resolve.outputs.issue_body }}
      branch_name: ${{ steps.resolve.outputs.branch_name }}
      source_labels: ${{ steps.resolve.outputs.source_labels }}
      allow_safe_automerge: ${{ steps.resolve.outputs.allow_safe_automerge }}

    steps:
      - name: Load issue details and eligibility
        id: resolve
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber =
              context.eventName === 'workflow_dispatch'
                ? Number(context.payload.inputs?.issue_number)
                : context.payload.issue?.number;

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.setFailed('A valid issue number is required.');
              return;
            }

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const labels = issue.labels.map((label) =>
              typeof label === 'string' ? label : label.name ?? '',
            );
            const hasLabel = (name) => labels.includes(name);
            const shouldRun =
              issue.state === 'open' &&
              hasLabel('agent:ready') &&
              hasLabel('risk:low') &&
              !hasLabel('needs:human-decision') &&
              !hasLabel('risk:medium') &&
              !hasLabel('risk:high');
            const allowSafeAutomerge = shouldRun && hasLabel('automerge:safe');

            core.setOutput('should_run', String(shouldRun));
            core.setOutput('issue_number', String(issue.number));
            core.setOutput('issue_title', issue.title ?? '');
            core.setOutput('issue_url', issue.html_url ?? issue.url ?? '');
            core.setOutput('issue_body', issue.body ?? '');
            core.setOutput('branch_name', `codex/issue-${issue.number}-low-risk`);
            core.setOutput('source_labels', labels.join(', '));
            core.setOutput('allow_safe_automerge', String(allowSafeAutomerge));

            if (!shouldRun) {
              core.notice(
                `Skipping issue #${issue.number}: state=${issue.state}, labels=${labels.join(', ') || 'none'}`,
              );
            }

  codex-generate:
    name: Generate low-risk patch
    if: needs.resolve-issue.outputs.should_run == 'true'
    needs:
      - resolve-issue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create working branch
        env:
          BRANCH_NAME: ${{ needs.resolve-issue.outputs.branch_name }}
        run: git switch --create "$BRANCH_NAME"

      - name: Write issue context for Codex
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.resolve-issue.outputs.issue_title }}
          ISSUE_URL: ${{ needs.resolve-issue.outputs.issue_url }}
          ISSUE_BODY: ${{ needs.resolve-issue.outputs.issue_body }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const issuePath = path.join(process.env.GITHUB_WORKSPACE, '.git', 'codex', 'low-risk-issue.md');
            fs.mkdirSync(path.dirname(issuePath), { recursive: true });

            const body = [
              `# GitHub Issue #${process.env.ISSUE_NUMBER}`,
              '',
              `URL: ${process.env.ISSUE_URL}`,
              '',
              '## Title',
              process.env.ISSUE_TITLE ?? '',
              '',
              '## Body',
              process.env.ISSUE_BODY ?? '',
              '',
            ].join('\n');

            fs.writeFileSync(issuePath, body, 'utf8');

      - name: Run Codex low-risk implementation
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4-mini
          effort: high
          prompt-file: .github/codex/prompts/low-risk-implementation.md
          output-file: .git/codex/codex-low-risk-implementation.json
          output-schema: |
            {
              "type": "object",
              "additionalProperties": false,
              "required": [
                "result",
                "summary",
                "risks",
                "rollback_plan",
                "deferred_items",
                "acceptance_criteria_coverage",
                "touched_surfaces",
                "untouched_high_risk_surfaces",
                "browser_manual_proof",
                "issue_comment",
                "human_review_reason"
              ],
              "properties": {
                "result": {
                  "type": "string",
                  "enum": ["ready", "no_changes", "needs_human_review"]
                },
                "summary": {
                  "type": "string"
                },
                "risks": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                },
                "rollback_plan": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                },
                "deferred_items": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                },
                "acceptance_criteria_coverage": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                },
                "touched_surfaces": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                },
                "untouched_high_risk_surfaces": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                },
                "browser_manual_proof": {
                  "type": "array",
                  "items": {
                    "type": "string"
                  }
                },
                "issue_comment": {
                  "type": "string"
                },
                "human_review_reason": {
                  "type": ["string", "null"]
                }
              }
            }
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Capture Codex patch artifact
        if: always()
        shell: bash
        run: |
          git add -N .
          git diff --binary --stat > "$RUNNER_TEMP/codex-diff.stat"
          git diff --binary > "$RUNNER_TEMP/codex-changes.patch"
          git diff --name-only > "$RUNNER_TEMP/codex-changed-files.txt"

      - name: Upload Codex patch artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: codex-low-risk-issue-${{ needs.resolve-issue.outputs.issue_number }}
          path: |
            ${{ runner.temp }}/codex-diff.stat
            ${{ runner.temp }}/codex-changes.patch
            ${{ runner.temp }}/codex-changed-files.txt
          if-no-files-found: error

  validate-and-open-pr:
    name: Validate and open PR
    if: needs.resolve-issue.outputs.should_run == 'true'
    needs:
      - resolve-issue
      - codex-generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Download Codex patch artifact
        uses: actions/download-artifact@v6
        with:
          name: codex-low-risk-issue-${{ needs.resolve-issue.outputs.issue_number }}
          path: ${{ runner.temp }}/codex-low-risk

      - name: Parse Codex result
        id: codex_result
        uses: actions/github-script@v8
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-generate.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const parsed = JSON.parse(process.env.CODEX_FINAL_MESSAGE ?? '{}');
            core.setOutput('codex_result', parsed.result ?? '');
            core.setOutput('summary', parsed.summary ?? '');
            core.setOutput('issue_comment', parsed.issue_comment ?? '');
            core.setOutput('human_review_reason', parsed.human_review_reason ?? '');
            core.setOutput('risks_json', JSON.stringify(parsed.risks ?? []));
            core.setOutput('rollback_plan_json', JSON.stringify(parsed.rollback_plan ?? []));
            core.setOutput('deferred_items_json', JSON.stringify(parsed.deferred_items ?? []));
            core.setOutput(
              'acceptance_criteria_coverage_json',
              JSON.stringify(parsed.acceptance_criteria_coverage ?? []),
            );
            core.setOutput(
              'touched_surfaces_json',
              JSON.stringify(parsed.touched_surfaces ?? []),
            );
            core.setOutput(
              'untouched_high_risk_surfaces_json',
              JSON.stringify(parsed.untouched_high_risk_surfaces ?? []),
            );
            core.setOutput(
              'browser_manual_proof_json',
              JSON.stringify(parsed.browser_manual_proof ?? []),
            );

      - name: Comment when human review is required
        if: steps.codex_result.outputs.codex_result == 'needs_human_review'
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_COMMENT: ${{ steps.codex_result.outputs.issue_comment }}
          HUMAN_REVIEW_REASON: ${{ steps.codex_result.outputs.human_review_reason }}
        with:
          github-token: ${{ github.token }}
          script: |
            const reason = process.env.HUMAN_REVIEW_REASON
              ? `\n\nReason: ${process.env.HUMAN_REVIEW_REASON}`
              : '';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `## Codex low-risk automation\n\n${process.env.ISSUE_COMMENT || 'This issue needs human review before automation can continue.'}${reason}`,
            });

      - name: Comment when no changes are needed
        if: steps.codex_result.outputs.codex_result == 'no_changes'
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_COMMENT: ${{ steps.codex_result.outputs.issue_comment }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `## Codex low-risk automation\n\n${process.env.ISSUE_COMMENT || 'No code changes were needed for this issue.'}`,
            });

      - name: Create working branch
        if: steps.codex_result.outputs.codex_result == 'ready'
        env:
          BRANCH_NAME: ${{ needs.resolve-issue.outputs.branch_name }}
        run: git switch --create "$BRANCH_NAME"

      - name: Apply Codex patch
        if: steps.codex_result.outputs.codex_result == 'ready'
        shell: bash
        run: |
          PATCH_FILE="$RUNNER_TEMP/codex-low-risk/codex-changes.patch"
          if [ -s "$PATCH_FILE" ]; then
            git apply --binary "$PATCH_FILE"
          fi

      - name: Check for changed files
        id: changed_files
        if: steps.codex_result.outputs.codex_result == 'ready'
        shell: bash
        run: |
          git add -N .
          git diff --name-only > "$RUNNER_TEMP/changed-files.txt"
          if [ ! -s "$RUNNER_TEMP/changed-files.txt" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when Codex produced no repository changes
        if: steps.changed_files.outputs.has_changes == 'false'
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_COMMENT: ${{ steps.codex_result.outputs.issue_comment }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `## Codex low-risk automation\n\n${process.env.ISSUE_COMMENT || 'Codex did not produce any repository changes for this issue.'}`,
            });

      - name: Guard forbidden paths
        id: guard_paths
        if: steps.changed_files.outputs.has_changes == 'true'
        run: |
          node scripts/agent/check-automation-scope.mjs --mode low-risk --paths-file "$RUNNER_TEMP/changed-files.txt"

      - name: Comment when forbidden paths were touched
        if: steps.guard_paths.outputs.blocked == 'true'
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          SUMMARY: ${{ steps.codex_result.outputs.summary }}
          VIOLATIONS: ${{ steps.guard_paths.outputs.violations_markdown }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: [
                '## Codex low-risk automation',
                '',
                'Codex proposed edits outside the allowed low-risk surface. Human review is required.',
                '',
                process.env.SUMMARY || '',
                '',
                'Forbidden paths touched:',
                process.env.VIOLATIONS || '- None captured.',
              ].join('\n'),
            });

      - name: Stop when forbidden paths were touched
        if: steps.guard_paths.outputs.blocked == 'true'
        shell: bash
        run: exit 1

      - name: Set up pnpm
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: pnpm lint

      - name: Type-check
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: pnpm type-check

      - name: Test
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: pnpm test

      - name: Build
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: pnpm build

      - name: Check formatting
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: |
          if ! pnpm format:check; then
            echo "::warning::pnpm format:check failed. Formatting drift is non-blocking in this workflow."
          fi

      - name: Check diff formatting
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: git diff --check

      - name: Check safe auto-merge path eligibility
        id: safe_automerge_paths
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        run: |
          node scripts/agent/check-automation-scope.mjs --mode safe-automerge --paths-file "$RUNNER_TEMP/changed-files.txt"

      - name: Commit and push branch
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        env:
          BRANCH_NAME: ${{ needs.resolve-issue.outputs.branch_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Codex low-risk issue #${{ needs.resolve-issue.outputs.issue_number }}"
          git push --force-with-lease origin "$BRANCH_NAME"

      - name: Create or update pull request
        id: create_pr
        if: steps.changed_files.outputs.has_changes == 'true' && steps.guard_paths.outputs.blocked != 'true'
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.resolve-issue.outputs.issue_title }}
          ISSUE_URL: ${{ needs.resolve-issue.outputs.issue_url }}
          BRANCH_NAME: ${{ needs.resolve-issue.outputs.branch_name }}
          SOURCE_LABELS: ${{ needs.resolve-issue.outputs.source_labels }}
          ALLOW_SAFE_AUTOMERGE: ${{ needs.resolve-issue.outputs.allow_safe_automerge }}
          SUMMARY: ${{ steps.codex_result.outputs.summary }}
          RISKS_JSON: ${{ steps.codex_result.outputs.risks_json }}
          ROLLBACK_PLAN_JSON: ${{ steps.codex_result.outputs.rollback_plan_json }}
          DEFERRED_ITEMS_JSON: ${{ steps.codex_result.outputs.deferred_items_json }}
          ACCEPTANCE_CRITERIA_COVERAGE_JSON: ${{ steps.codex_result.outputs.acceptance_criteria_coverage_json }}
          TOUCHED_SURFACES_JSON: ${{ steps.codex_result.outputs.touched_surfaces_json }}
          UNTOUCHED_HIGH_RISK_SURFACES_JSON: ${{ steps.codex_result.outputs.untouched_high_risk_surfaces_json }}
          BROWSER_MANUAL_PROOF_JSON: ${{ steps.codex_result.outputs.browser_manual_proof_json }}
          SAFE_AUTOMERGE_ELIGIBLE: ${{ steps.safe_automerge_paths.outputs.eligible }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');

            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const branchName = process.env.BRANCH_NAME;
            const changedFiles = fs
              .readFileSync(`${process.env.RUNNER_TEMP}/changed-files.txt`, 'utf8')
              .split('\n')
              .filter(Boolean);

            const risks = JSON.parse(process.env.RISKS_JSON || '[]');
            const rollbackPlan = JSON.parse(process.env.ROLLBACK_PLAN_JSON || '[]');
            const deferredItems = JSON.parse(process.env.DEFERRED_ITEMS_JSON || '[]');
            const acceptanceCriteriaCoverage = JSON.parse(
              process.env.ACCEPTANCE_CRITERIA_COVERAGE_JSON || '[]',
            );
            const touchedSurfaces = JSON.parse(process.env.TOUCHED_SURFACES_JSON || '[]');
            const untouchedHighRiskSurfaces = JSON.parse(
              process.env.UNTOUCHED_HIGH_RISK_SURFACES_JSON || '[]',
            );
            const browserManualProof = JSON.parse(
              process.env.BROWSER_MANUAL_PROOF_JSON || '[]',
            );
            const propagatedLabels =
              process.env.ALLOW_SAFE_AUTOMERGE === 'true' &&
              process.env.SAFE_AUTOMERGE_ELIGIBLE === 'true'
                ? ['risk:low', 'automerge:safe']
                : [];

            const renderList = (items, emptyText) =>
              items.length > 0 ? items.map((item) => `- ${item}`).join('\n') : `- ${emptyText}`;
            const syncPropagatedLabels = async (prNumber) => {
              if (propagatedLabels.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: propagatedLabels,
                });
                return;
              }

              for (const label of ['automerge:safe', 'risk:low']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    name: label,
                  });
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }
            };

            const body = [
              `Closes #${issueNumber}`,
              '',
              `Linked issue: ${process.env.ISSUE_URL}`,
              '',
              '## Route',
              '- Route: low-risk issue automation',
              '- Automation result: ready',
              '- Risk tier: `risk:low` source issue route',
              `- Source labels: ${process.env.SOURCE_LABELS || 'none'}`,
              `- Propagated PR labels: ${propagatedLabels.length > 0 ? propagatedLabels.map((label) => `\`${label}\``).join(', ') : 'none'}`,
              '',
              '## Summary',
              process.env.SUMMARY || 'Low-risk repository automation update.',
              '',
              '## Files Changed',
              renderList(changedFiles.map((file) => `\`${file}\``), 'None.'),
              '',
              '## Acceptance Criteria Coverage',
              renderList(
                acceptanceCriteriaCoverage,
                'See the linked issue acceptance criteria; no additional coverage notes were provided.',
              ),
              '',
              '## Validation',
              '- `pnpm install --frozen-lockfile`: passed',
              '- `pnpm lint`: passed',
              '- `pnpm type-check`: passed',
              '- `pnpm test`: passed',
              '- `pnpm build`: passed',
              '- `pnpm format:check`: warning-only failure is allowed when caused by unrelated repo baseline drift',
              '- `git diff --check`: passed',
              '',
              '## Browser / Manual Proof',
              renderList(browserManualProof, 'Not applicable.'),
              '',
              '## Risk Surfaces Touched',
              renderList(touchedSurfaces, 'None beyond the bounded low-risk surface.'),
              '',
              '## Risk Surfaces Intentionally Not Touched',
              renderList(
                untouchedHighRiskSurfaces,
                'No additional risky surfaces were declared in the Codex result.',
              ),
              '',
              '## Risks',
              renderList(risks, 'Low-risk scoped automation only.'),
              '',
              '## Rollback Plan',
              renderList(rollbackPlan, 'Revert the automation commit and close this PR.'),
              '',
              '## Deferred Items',
              renderList(deferredItems, 'None.'),
            ].join('\n');

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branchName}`,
              base: 'main',
            });

            if (existing.data.length > 0) {
              const updated = await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: existing.data[0].number,
                title: `[Codex] ${process.env.ISSUE_TITLE}`,
                body,
              });
              await syncPropagatedLabels(updated.data.number);
              core.setOutput('pr_number', String(updated.data.number));
              core.setOutput('pr_url', updated.data.html_url ?? '');
              return;
            }

            const created = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Codex] ${process.env.ISSUE_TITLE}`,
              head: branchName,
              base: 'main',
              body,
            });

            await syncPropagatedLabels(created.data.number);
            core.setOutput('pr_number', String(created.data.number));
            core.setOutput('pr_url', created.data.html_url ?? '');

      - name: Write automation decision summary
        if: always()
        shell: bash
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          SOURCE_LABELS: ${{ needs.resolve-issue.outputs.source_labels }}
          CODEX_RESULT: ${{ steps.codex_result.outputs.codex_result }}
          HUMAN_REVIEW_REASON: ${{ steps.codex_result.outputs.human_review_reason }}
          HAS_CHANGES: ${{ steps.changed_files.outputs.has_changes }}
          BLOCKED: ${{ steps.guard_paths.outputs.blocked }}
          SAFE_AUTOMERGE_ELIGIBLE: ${{ steps.safe_automerge_paths.outputs.eligible }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          {
            echo "## Automation Decision Log"
            echo
            echo "- Route: low-risk issue automation"
            echo "- Issue: #$ISSUE_NUMBER"
            echo "- Source labels: ${SOURCE_LABELS:-none}"
            echo "- Codex result: ${CODEX_RESULT:-not-run}"
            echo "- Changed files produced: ${HAS_CHANGES:-false}"
            echo "- Guard blocked: ${BLOCKED:-false}"
            echo "- Safe auto-merge path eligible: ${SAFE_AUTOMERGE_ELIGIBLE:-false}"
            if [ -n "$PR_NUMBER" ]; then
              echo "- PR opened or updated: #$PR_NUMBER"
            fi
            if [ -n "$PR_URL" ]; then
              echo "- PR URL: $PR_URL"
            fi
            if [ "${HAS_CHANGES:-false}" = "true" ] && [ "${BLOCKED:-false}" != "true" ] && [ -n "$PR_NUMBER" ]; then
              echo "- Validation summary: install/lint/type-check/test/build/diff passed; format drift warning remains non-blocking"
            fi
            if [ -n "$HUMAN_REVIEW_REASON" ]; then
              echo "- Human intervention: required"
              echo "- Escalation reason: $HUMAN_REVIEW_REASON"
            else
              echo "- Human intervention: not required by Codex result"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
