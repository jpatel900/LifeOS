# Detects the KNOWN_ISSUES row 11 failure mode: app deploys (Vercel, on merge)
# outrunning the production database, which only changes via a manual
# `supabase db push`. Detection only — it never applies DDL to production.
#
# Requires one repository secret to do real work: SUPABASE_PROD_DB_URL — a
# Postgres connection string for the prod project (Supabase dashboard ->
# Connect -> Session pooler). Prefer a read-only role; the job only reads
# supabase_migrations.schema_migrations.
#
# A missing secret FAILS the check on push-to-main (and on the migration-apply
# re-dispatch) — this guard must not be silently disarmable by an unset
# secret. The only way to skip is an explicit manual workflow_dispatch with
# allow_skip=true.
name: Migration Drift

# Runs on every push to main (not just migration paths) so an unresolved red
# re-fires on each merge until production is caught up. The check takes ~5s.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      allow_skip:
        description: "Skip the check if SUPABASE_PROD_DB_URL is unset (manual dispatch only; never honored on push)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  drift:
    name: Prod migration drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compare repo migrations against production
        env:
          PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
          EVENT_NAME: ${{ github.event_name }}
          ALLOW_SKIP: ${{ github.event.inputs.allow_skip }}
        run: |
          if [ -z "$PROD_DB_URL" ]; then
            if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$ALLOW_SKIP" = "true" ]; then
              echo "::warning::SUPABASE_PROD_DB_URL secret is not set; skipping the drift check (allow_skip=true on manual dispatch)."
              exit 0
            fi

            echo "::error::SUPABASE_PROD_DB_URL secret is not set, so the migration drift guard is disarmed. This check must not silently pass — set the secret, or if this is a deliberate manual skip, re-run via workflow_dispatch with allow_skip=true."
            exit 1
          fi

          local_versions=$(basename -s .sql supabase/migrations/*.sql | cut -d_ -f1 | sort)
          remote_versions=$(psql "$PROD_DB_URL" -tAc \
            "select version from supabase_migrations.schema_migrations order by version")

          missing=$(comm -23 <(printf '%s\n' "$local_versions") <(printf '%s\n' "$remote_versions"))

          if [ -n "$missing" ]; then
            echo "::error::Production is missing these repo migrations. Response procedure: .agents/skills/lifeos-migration-drift-response/SKILL.md (assemble one transaction from the files below + ledger insert; human-gated apply):"
            printf '%s\n' "$missing"
            exit 1
          fi

          echo "Production has all $(printf '%s\n' "$local_versions" | wc -l) repo migrations."
