name: Main Red Guard

# Safety net for merging PRs without the strict up-to-date requirement:
# if CI fails on a push to main (e.g. two individually-green PRs conflict
# semantically), first retry the failed jobs once (flake guard). If the
# failure reproduces, open a revert PR back to the last green commit and
# arm auto-merge on it — it lands on its own once its checks pass, so
# recovery needs no human in the loop. Closing the guard PR cancels the
# revert when a forward fix is preferred.

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  push:
    branches:
      - main

concurrency:
  group: main-red-guard-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  flake-guard:
    name: Retry first failure once
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.run_attempt == 1
    steps:
      - name: Re-run failed jobs before trusting the red
        env:
          # github.token, NOT the kick PAT: rerunning needs actions:write, which this
          # workflow grants to github.token. The Issues+PRs-scoped PAT got
          # "Resource not accessible by personal access token" on 2026-07-04
          # (run 28708134672), so the flake retry never happened and the
          # auto-revert (gated on run_attempt >= 2) could never arm.
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          gh run rerun "$RUN_ID" --failed --repo "${{ github.repository }}"
          echo "Red main at attempt 1: re-ran failed jobs. Only a reproduced failure (attempt 2+) triggers the auto-revert."

  guard:
    name: Open auto-merging revert PR when main stays red
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.run_attempt >= 2
    steps:
      - name: Checkout main history
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # github.token, NOT the kick PAT: the checkout token becomes the
          # persisted credential `git push origin guard/revert-main-*` uses.
          # The Issues+PRs-scoped kick PAT lacks contents:write and 403'd the
          # push on 2026-07-09 (run 29055368826, "denied to jpatel900") — the
          # revert silently never landed. github.token has the contents:write
          # this workflow's permissions grant. PR creation below still uses
          # the kick PAT so the revert PR's own checks actually trigger.
          token: ${{ github.token }}

      - name: Skip if a guard revert PR is already open
        id: dedupe
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = prs.data.find((pr) =>
              pr.head.ref.startsWith('guard/revert-main-'),
            );
            core.setOutput('skip', existing ? 'true' : 'false');
            if (existing) {
              core.notice(`Guard revert PR already open: ${existing.html_url}`);
            }

      - name: Find last green main commit
        if: steps.dedupe.outputs.skip != 'true'
        id: green
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
          script: |
            const failedSha = context.payload.workflow_run.head_sha;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              status: 'success',
              per_page: 50,
            });
            const green = runs.data.workflow_runs.find(
              (r) => r.name === 'CI' && r.head_sha !== failedSha,
            );
            core.setOutput('sha', green ? green.head_sha : '');
            core.setOutput('failed_sha', failedSha);

      - name: Create revert branch and PR
        if: steps.dedupe.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
          GREEN_SHA: ${{ steps.green.outputs.sha }}
          FAILED_SHA: ${{ steps.green.outputs.failed_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          git config user.name "main-red-guard[bot]"
          git config user.email "main-red-guard@users.noreply.github.com"

          short="${FAILED_SHA:0:8}"
          branch="guard/revert-main-${short}"

          # Fall back to the parent commit when no prior green run is known.
          base="${GREEN_SHA:-$(git rev-parse "${FAILED_SHA}^")}"

          if ! git merge-base --is-ancestor "$base" "$FAILED_SHA"; then
            base="$(git rev-parse "${FAILED_SHA}^")"
          fi

          commits="$(git log --oneline "${base}..${FAILED_SHA}" | head -20)"
          echo "Reverting range ${base}..${FAILED_SHA}:"
          echo "$commits"

          git switch -c "$branch" "$FAILED_SHA"
          if git revert --no-commit "${base}..${FAILED_SHA}"; then
            git commit -m "Revert main to last green (${base:0:8}) after red CI at ${short}"
            git push origin "$branch"
            pr_url="$(gh pr create \
              --base main \
              --head "$branch" \
              --title "Auto-revert: main went red at ${short}" \
              --body "$(printf 'CI failed on main twice (original + flake-guard retry): %s\n\nThis PR reverts main back to the last green commit `%s` and has auto-merge armed — it lands on its own once its checks pass. **Close this PR to cancel the revert** if a forward fix is faster.\n\nReverted commits:\n```\n%s\n```\n\nOpened automatically by Main Red Guard.' "$RUN_URL" "${base:0:8}" "$commits")")"
            gh pr merge --squash --auto "$pr_url" \
              || gh pr comment "$pr_url" --body "Auto-merge could not be armed (likely missing CODEX_KICK_TOKEN or checks not reporting on this PR). Merge manually to restore green."
          else
            git revert --abort || true
            gh issue create \
              --title "main is red at ${short} and auto-revert could not apply" \
              --body "$(printf 'CI failed on main: %s\n\nAutomatic revert of `%s..%s` hit conflicts, so no revert PR was opened. Manual intervention needed.\n\nCommits since last green:\n```\n%s\n```' "$RUN_URL" "${base:0:8}" "$short" "$commits")"
          fi
  demote-red-main-safe-automerge-class:
    name: Open safe auto-merge class demotion PR after red main
    runs-on: ubuntu-latest
    needs: guard
    if: >-
      always() &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.run_attempt >= 2
    steps:
      - name: Checkout main history
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # github.token for git pushes (kick PAT lacks contents:write — same
          # 403 class as the guard job's 2026-07-09 failure).
          token: ${{ github.token }}

      - name: Open demotion PR for implicated safe auto-merge class
        env:
          GH_TOKEN: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
        run: |
          node scripts/agent/safe-automerge-demotion.mjs \
            --trigger-kind red-main \
            --trigger-url "${{ github.event.workflow_run.html_url }}" \
            --implicated-sha "${{ github.event.workflow_run.head_sha }}"

  demote-reverted-safe-automerge-class:
    name: Open safe auto-merge class demotion PR after revert
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout main history
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          # github.token for git pushes (kick PAT lacks contents:write — same
          # 403 class as the guard job's 2026-07-09 failure).
          token: ${{ github.token }}

      - name: Open demotion PR for reverted safe auto-merge class
        env:
          GH_TOKEN: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.CODEX_KICK_TOKEN || github.token }}
        run: |
          node scripts/agent/safe-automerge-demotion.mjs \
            --trigger-kind revert \
            --trigger-url "${{ github.event.compare }}" \
            --revert-sha "${{ github.sha }}"
