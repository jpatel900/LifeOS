name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  codex-review:
    name: Codex Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex PR review
        id: run_codex
        uses: openai/codex-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr-review.md
          output-file: codex-pr-review.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Upload Codex review artifact
        if: hashFiles('codex-pr-review.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: codex-pr-review-${{ github.event.pull_request.number }}
          path: codex-pr-review.md
          if-no-files-found: error

  post-review:
    name: Post Codex review
    if: github.event.pull_request.draft == false && needs.codex-review.outputs.final_message != ''
    needs:
      - codex-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Publish pull request review
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'COMMENT',
              body: process.env.CODEX_FINAL_MESSAGE,
            });
