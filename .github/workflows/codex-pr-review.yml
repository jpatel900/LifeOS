name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docs-scope:
    name: Detect docs-only scope
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect docs-only diff
        id: detect
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --no-tags --depth=1 origin "$PR_BASE_SHA" || true
          changed="$(git diff --name-only "$PR_BASE_SHA" HEAD)"
          echo "Changed files:"; echo "$changed"
          # Mirrors the T0 safe auto-merge allowlist: docs-only PRs are gated by the
          # deterministic path evaluator + full test suite; LLM review adds cost, not safety.
          if [ -n "$changed" ] && ! echo "$changed" | grep -qvE '^(docs/|README\.md$|\.github/ISSUE_TEMPLATE/)'; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs-only diff: skipping LLM review jobs."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  classify-risk:
    name: Classify PR risk
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    outputs:
      escalation_required: ${{ steps.classify.outputs.escalation_required }}
      risk_level: ${{ steps.classify.outputs.risk_level }}
      escalation_reasons: ${{ steps.classify.outputs.escalation_reasons }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0

      - name: Classify pull request risk
        id: classify
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/agent/classify-pr-risk.mjs

  baseline-review:
    name: Codex baseline review
    # Single-review policy: baseline (mini) runs only when the escalated review will NOT.
    # One LLM review per PR, never two.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      needs.docs-scope.outputs.docs_only != 'true' &&
      needs.classify-risk.outputs.escalation_required != 'true'
    needs:
      - docs-scope
      - classify-risk
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex baseline PR review
        id: run_codex
        uses: openai/codex-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_RISK_LEVEL: ${{ needs.classify-risk.outputs.risk_level }}
          PR_ESCALATION_REASONS: ${{ needs.classify-risk.outputs.escalation_reasons }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4-mini
          effort: medium
          prompt-file: .github/codex/prompts/pr-review-baseline.md
          output-file: codex-pr-review-baseline.md
          sandbox: read-only
          safety-strategy: drop-sudo

  post-baseline-review:
    name: Post baseline review
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      needs.baseline-review.outputs.final_message != ''
    needs:
      - classify-risk
      - baseline-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Publish baseline pull request review
        uses: actions/github-script@v8
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.baseline-review.outputs.final_message }}
          PR_RISK_LEVEL: ${{ needs.classify-risk.outputs.risk_level }}
          PR_ESCALATION_REASONS: ${{ needs.classify-risk.outputs.escalation_reasons }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              '## Codex Baseline Review',
              `Model: gpt-5.4-mini`,
              `Effort: medium`,
              `Classifier risk level: ${process.env.PR_RISK_LEVEL}`,
              `Classifier escalation reasons: ${process.env.PR_ESCALATION_REASONS}`,
              '',
              process.env.CODEX_FINAL_MESSAGE,
            ].join('\n');

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'COMMENT',
              body,
            });

  escalated-review:
    name: Codex escalated review
    # !cancelled() is required: baseline-review is skipped when escalation is already
    # required (single-review policy), and a skipped dependency would otherwise skip
    # this job too. Docs-only PRs never run LLM review; the docRegistry guard test and
    # the deterministic safe-automerge path evaluator gate those.
    if: >-
      !cancelled() &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      needs.classify-risk.result == 'success' &&
      needs.docs-scope.outputs.docs_only != 'true' &&
      (
        needs.classify-risk.outputs.escalation_required == 'true' ||
        contains(needs.baseline-review.outputs.final_message, 'ESCALATE_RECOMMENDED: true')
      )
    needs:
      - docs-scope
      - classify-risk
      - baseline-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex escalated PR review
        id: run_codex
        uses: openai/codex-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_RISK_LEVEL: ${{ needs.classify-risk.outputs.risk_level }}
          PR_ESCALATION_REASONS: ${{ needs.classify-risk.outputs.escalation_reasons }}
          BASELINE_FINAL_MESSAGE: ${{ needs.baseline-review.outputs.final_message }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4
          effort: high
          prompt-file: .github/codex/prompts/pr-review-escalated.md
          output-file: codex-pr-review-escalated.md
          sandbox: read-only
          safety-strategy: drop-sudo

  post-escalated-review:
    name: Post escalated review
    # !cancelled() mirrors escalated-review: baseline-review in `needs` may be skipped.
    if: >-
      !cancelled() &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      needs.escalated-review.result == 'success' &&
      needs.escalated-review.outputs.final_message != ''
    needs:
      - classify-risk
      - baseline-review
      - escalated-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Publish escalated pull request review
        uses: actions/github-script@v8
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.escalated-review.outputs.final_message }}
          PR_ESCALATION_REASONS: ${{ needs.classify-risk.outputs.escalation_reasons }}
          BASELINE_FINAL_MESSAGE: ${{ needs.baseline-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const baselineMessage = process.env.BASELINE_FINAL_MESSAGE ?? '';
            const baselineRequestedEscalation = baselineMessage.includes('ESCALATE_RECOMMENDED: true');
            const baselineReasonMatch = baselineMessage.match(/^ESCALATION_REASON:\s*(.+)$/m);
            const triggerReasons = [];

            if (process.env.PR_ESCALATION_REASONS && process.env.PR_ESCALATION_REASONS !== 'none') {
              triggerReasons.push(`classifier: ${process.env.PR_ESCALATION_REASONS}`);
            }

            if (baselineRequestedEscalation) {
              triggerReasons.push(
                `baseline reviewer: ${baselineReasonMatch ? baselineReasonMatch[1] : 'requested escalation'}`,
              );
            }

            const body = [
              '## Codex Escalated Review',
              'Model: gpt-5.4',
              'Effort: high',
              `Escalation trigger: ${triggerReasons.length > 0 ? triggerReasons.join(' | ') : 'manual risk escalation'}`,
              '',
              process.env.CODEX_FINAL_MESSAGE,
            ].join('\n');

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'COMMENT',
              body,
            });
