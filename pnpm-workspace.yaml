packages:
  - "apps/*"
  - "packages/*"
overrides:
  # Scoped to the 1.x consumer (minimatch@3) on purpose: brace-expansion@5.0.7
  # is also in the tree via minimatch@10 and is NOT vulnerable. An unscoped
  # override would drag 5.0.7 down to 1.1.16 and break it.
  "brace-expansion@1": ^1.1.16
  dompurify: ^3.4.12
  fast-uri: ^3.1.4
  postcss: ^8.5.15
  protobufjs: ^8.6.6
  vite: ^7.3.5
allowBuilds:
  "@sentry/cli": false
  core-js: false
  esbuild: true
  protobufjs: false
  sharp: true
  unrs-resolver: true
